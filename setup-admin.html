<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Setup - Syntax Syndicate</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--white:#ffffff;--tint:#f0f4ff;--border:#d0d7e8;--text:#0a0e1a;--text-2:#3d4a66;--accent:#4169e1;--carbon-black:#0a0e1a;--font:'DM Sans',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--tint);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:40px;max-width:440px;width:100%;box-shadow:0 12px 48px rgba(10,14,26,0.06);}
h2{font-size:1.3rem;margin-bottom:6px;}
.sub{color:var(--text-2);font-size:.88rem;margin-bottom:24px;}
.warn{background:#fff3cd;border:1px solid #ffc107;border-radius:10px;padding:14px;font-size:.82rem;color:#856404;margin-bottom:20px;line-height:1.5;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:.8rem;font-weight:600;margin-bottom:5px;color:var(--text-2);}
.form-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:10px;font-family:var(--font);outline:none;}
.form-input:focus{border-color:var(--accent);}
.btn{width:100%;padding:14px;background:var(--carbon-black);color:#fff;border:none;border-radius:10px;font-weight:600;font-family:var(--font);cursor:pointer;font-size:.95rem;margin-top:8px;}
.btn:hover{background:#1a2035;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.result{margin-top:20px;padding:16px;background:#e8f5e9;border:1px solid #c8e6c9;border-radius:10px;font-size:.88rem;color:#2e7d32;display:none;line-height:1.6;}
</style>
</head>
<body>
<div class="card">
  <h2>🔧 One-Time Admin Setup</h2>
  <p class="sub">Create the first superadmin account for Syntax Syndicate.</p>
  <div class="warn">⚠️ <strong>Delete this file</strong> after creating your admin account. This page should never be accessible in production.</div>

  <form id="setupForm">
    <div class="form-group">
      <label class="form-label">Admin Email</label>
      <input type="email" id="email" class="form-input" value="admin@syntaxsyndicate.co.in" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Admin Password</label>
      <input type="text" id="password" class="form-input" value="SyntaxAdmin@2025" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Admin Name</label>
      <input type="text" id="name" class="form-input" value="Syntax Syndicate Admin" required/>
    </div>
    <button type="submit" class="btn" id="btnSetup">Create Superadmin Account</button>
  </form>

  <div class="result" id="resultBox"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
document.getElementById('setupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btnSetup');
  btn.disabled = true; btn.innerText = 'Creating...';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const name = document.getElementById('name').value.trim();

  try {
    const cred = await auth.createUserWithEmailAndPassword(email, password);
    await db.collection('users').doc(cred.user.uid).set({
      name: name,
      email: email,
      college: 'Syntax Syndicate HQ',
      level: '',
      branch: '',
      mobile: '',
      role: 'superadmin',
      apply_clicks: 0,
      books_read: 0,
      projects_done: 0,
      portfolio_link: '',
      share_profile: false,
      is_active: true,
      badges: ['Founder', 'Superadmin'],
      created_at: firebase.firestore.FieldValue.serverTimestamp()
    });

    const box = document.getElementById('resultBox');
    box.style.display = 'block';
    box.innerHTML = `
      ✅ <strong>Superadmin created successfully!</strong><br/><br/>
      <strong>Email:</strong> ${email}<br/>
      <strong>Password:</strong> ${password}<br/>
      <strong>Role:</strong> superadmin<br/><br/>
      You can now <a href="login.html">log in</a> and access the <a href="admin.html">Admin Panel</a>.<br/><br/>
      ⚠️ <strong>Delete setup-admin.html from your project now.</strong>
    `;
    btn.innerText = '✓ Done';
  } catch(err) {
    btn.disabled = false; btn.innerText = 'Create Superadmin Account';
    const box = document.getElementById('resultBox');
    box.style.display = 'block';
    box.style.background = 'rgba(230,57,70,0.08)';
    box.style.borderColor = 'rgba(230,57,70,0.25)';
    box.style.color = '#e63946';
    box.innerHTML = '❌ Error: ' + err.message;
  }
});
</script>
</body>
</html>
