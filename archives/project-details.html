<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project Details — Syntax Syndicate</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" href="../css/global.css"/>
<!-- Markdown Parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root {
  --prem-bg: #050811;
  --prem-card: rgba(255, 255, 255, 0.03);
  --prem-border: rgba(255, 255, 255, 0.1);
  --accent-gold: #fbbf24;
}

body {
  background: var(--prem-bg);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
}

.details-container {
  max-width: 1200px;
  margin: 60px auto 100px;
  padding: 0 24px;
}

/* ── HEADER ── */
.project-header {
  margin-bottom: 40px;
  text-align: center;
}

.project-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(251, 191, 36, 0.1);
  color: var(--accent-gold);
  padding: 8px 18px;
  border-radius: 100px;
  font-family: var(--mono);
  font-size: 0.65rem;
  font-weight: 800;
  text-transform: uppercase;
  margin-bottom: 24px;
  border: 1px solid rgba(251, 191, 36, 0.2);
}

.project-header h1 {
  font-size: clamp(2.2rem, 6vw, 3.8rem);
  font-weight: 900;
  letter-spacing: -0.05em;
  line-height: 1.1;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #fff 60%, rgba(255,255,255,0.4));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.project-meta {
  display: flex;
  justify-content: center;
  gap: 24px;
  color: rgba(255,255,255,0.4);
  font-size: 0.9rem;
  font-weight: 500;
}

/* ── CONTENT LAYOUT ── */
.details-grid {
  display: flex;
  flex-direction: row;
  gap: 48px;
  align-items: flex-start;
}

.details-main {
  flex: 1;
  background: var(--prem-card);
  border: 1px solid var(--prem-border);
  border-radius: 32px;
  padding: 48px;
  backdrop-filter: blur(10px);
}

.details-sidebar {
  width: 340px;
  position: sticky;
  top: 100px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.sidebar-card {
  background: var(--prem-card);
  border: 1px solid var(--prem-border);
  border-radius: 24px;
  padding: 28px;
}

.sidebar-card h4 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent-gold);
  margin-bottom: 16px;
  font-weight: 800;
}

/* ── MARKDOWN / README STYLING ── */
.readme-content {
  line-height: 1.8;
  font-size: 1.1rem;
  color: rgba(255,255,255,0.75);
}

.readme-content h1, .readme-content h2, .readme-content h3 {
  color: #ffffff !important;
  margin: 40px 0 20px;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.readme-content h1 { font-size: 2rem; border-bottom: 1px solid var(--prem-border); padding-bottom: 12px; }
.readme-content h2 { font-size: 1.6rem; }

.readme-content p { margin-bottom: 20px; }

.readme-content a { color: #4169e1; text-decoration: none; border-bottom: 1px dashed rgba(65, 105, 225, 0.4); }

.readme-content ul, .readme-content ol { margin-bottom: 24px; padding-left: 20px; }
.readme-content li { margin-bottom: 8px; }

.readme-content code {
  background: rgba(251, 191, 36, 0.15);
  color: #fbbf24;
  padding: 3px 8px;
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 0.9em;
  font-weight: 600;
}

.readme-content pre {
  background: #0a0e1a;
  padding: 24px;
  border-radius: 16px;
  overflow-x: auto;
  margin: 28px 0;
  border: 1px solid var(--prem-border);
}

.readme-content pre code {
  background: transparent;
  color: #e0e0e0;
  padding: 0;
  font-weight: 400;
}

.readme-content blockquote {
  border-left: 4px solid var(--accent-gold);
  background: rgba(251, 191, 36, 0.05);
  margin: 24px 0;
  padding: 16px 24px;
  font-style: italic;
  border-radius: 0 12px 12px 0;
}

/* ── ACTION BUTTONS ── */
.btn-download-big {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: linear-gradient(135deg, #fbbf24, #f43f5e);
  color: #fff;
  padding: 18px;
  border-radius: 16px;
  font-weight: 800;
  text-decoration: none;
  font-size: 1.05rem;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 10px 30px rgba(244, 63, 94, 0.2);
}

.btn-download-big:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(244, 63, 94, 0.3); }

.btn-demo-big {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--prem-border);
  color: #fff;
  padding: 18px;
  border-radius: 16px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.2s;
}

.btn-demo-big:hover { background: rgba(255,255,255,0.08); }

@media (max-width: 1024px) {
  .details-grid { flex-direction: column; }
  .details-sidebar { width: 100%; position: static; }
  .details-main { padding: 32px; }
}

@media (max-width: 600px) {
  .project-header h1 { font-size: 2rem; }
  .project-meta { flex-direction: column; gap: 8px; align-items: center; }
  .details-main { padding: 24px; border-radius: 20px; }
}
</style>
</head>
<body>

<div id="navbar-placeholder"></div>

<main class="details-container" id="detailsContainer" style="display:none;">
  <header class="project-header">
    <div class="project-badge"><i class="bi bi-diamond-fill"></i> Premium Project</div>
    <h1 id="pTitle">Loading...</h1>
    <div class="project-meta">
      <span id="pDate"><i class="bi bi-calendar3"></i> Loading...</span>
      <span id="pTech"><i class="bi bi-cpu"></i> Loading...</span>
    </div>
  </header>

  <div class="details-grid">
    <div class="details-main">
      <div id="readmeArea" class="readme-content"></div>
    </div>

    <div class="details-sidebar">
      <div class="action-box">
        <a href="#" id="btnDownload" class="btn-download-big"><i class="bi bi-cloud-arrow-down-fill"></i> Download Project</a>
        <a href="#" id="btnDemo" class="btn-demo-big" target="_blank"><i class="bi bi-play-circle"></i> Live Preview</a>
        
        <div class="sidebar-card" style="margin-top: 24px;">
          <h4>Project Purpose</h4>
          <p id="pPurpose" style="font-size: 0.9rem; line-height: 1.6; color: rgba(255,255,255,0.6);"></p>
        </div>

        <div class="sidebar-card">
          <h4>Key Concepts</h4>
          <ul id="pConcepts" style="padding-left: 18px; font-size: 0.9rem; color: rgba(255,255,255,0.6); line-height: 1.8;"></ul>
        </div>

        <div class="sidebar-card">
          <h4>Setup Instructions</h4>
          <pre id="pSetup" style="font-family: var(--mono); font-size: 0.75rem; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; overflow-x: auto; color: #fbbf24;"></pre>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="loadingState" style="text-align:center; padding: 200px 0;">
  <div class="spinner"></div>
  <p style="margin-top: 20px; color: rgba(255,255,255,0.4);">Fetching project details...</p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/db.js"></script>
<script src="../js/navbar.js"></script>

<script>
Auth.onAuthChange(async (user, profile) => {
  if (!user) {
    window.location.href = 'premium-landing.html';
    return;
  }
  if (profile) {
    const isPremium = ['premium','team','superadmin'].includes(profile.role);
    if (!isPremium) {
      window.location.href = 'premium-landing.html';
      return;
    }
    loadProjectDetails();
  }
});

async function loadProjectDetails() {
  const pid = SS.getQueryParam('id');
  if (!pid) {
    alert('Project ID missing');
    window.location.href = 'premium-projects.html';
    return;
  }

  try {
    const p = await DB.getDoc(`ss_premium_projects/${pid}`);
    if (!p) {
      alert('Project not found');
      window.location.href = 'premium-projects.html';
      return;
    }

    // Populate UI
    document.getElementById('pTitle').innerText = p.title;
    document.getElementById('pDate').innerHTML = `<i class="bi bi-calendar3"></i> ${SS.formatDateRelative(p.postedAt)}`;
    document.getElementById('pTech').innerHTML = `<i class="bi bi-cpu"></i> ${p.tags || 'General'}`;
    
    // Markdown README
    if (p.readme_markdown) {
      document.getElementById('readmeArea').innerHTML = marked.parse(p.readme_markdown);
    } else {
      document.getElementById('readmeArea').innerHTML = `<p>${p.description || 'No detailed documentation provided for this project.'}</p>`;
    }

    // Sidebar details
    document.getElementById('pPurpose').innerText = p.purpose || 'Master the architecture of modern web applications.';
    
    const concepts = (p.key_concepts || '').split(',').filter(Boolean);
    document.getElementById('pConcepts').innerHTML = concepts.length > 0 
      ? concepts.map(c => `<li>${c.trim()}</li>`).join('')
      : '<li>Architecture</li><li>Security</li><li>Efficiency</li>';
    
    document.getElementById('pSetup').innerText = p.setup_instructions || 'Check readme for setup details.';
    
    // Actions
    document.getElementById('btnDownload').href = p.github_link || '#';
    if (p.demo_link) {
      document.getElementById('btnDemo').href = p.demo_link;
      document.getElementById('btnDemo').style.display = 'flex';
    } else {
      document.getElementById('btnDemo').style.display = 'none';
    }

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('detailsContainer').style.display = 'block';

  } catch (err) {
    console.error(err);
    alert('Failed to load project details');
  }
}
</script>

</body>
</html>
