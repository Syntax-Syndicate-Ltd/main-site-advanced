<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project Details — Syntax Syndicate</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" href="../css/global.css"/>
<!-- Markdown Parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root {
  --prem-bg: #050811;
  --prem-card: rgba(255, 255, 255, 0.03);
  --prem-border: rgba(255, 255, 255, 0.1);
  --accent-gold: #fbbf24;
}

body {
  background: var(--prem-bg);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
  line-height: 1.6;
  width: 100%;
}

.details-container {
  max-width: 1200px;
  margin: 40px auto 100px;
  padding: 0 20px;
  width: 100%;
}

/* ── HEADER ── */
.project-header {
  margin-bottom: 50px;
  text-align: center;
  padding: 0 10px;
}

.project-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(251, 191, 36, 0.08);
  color: var(--accent-gold);
  padding: 8px 20px;
  border-radius: 100px;
  font-family: var(--mono);
  font-size: 0.68rem;
  font-weight: 800;
  text-transform: uppercase;
  margin-bottom: 24px;
  border: 1px solid rgba(251, 191, 36, 0.2);
  letter-spacing: 0.05em;
  max-width: 100%;
}

.project-header h1 {
  font-size: clamp(2.2rem, 5vw, 4rem);
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 1.1;
  margin-bottom: 24px;
  background: linear-gradient(180deg, #fff 40%, rgba(255,255,255,0.6) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  word-wrap: break-word;
}

.project-meta {
  display: flex;
  justify-content: center;
  gap: 32px;
  color: rgba(255,255,255,0.5);
  font-size: 0.95rem;
  font-weight: 600;
  flex-wrap: wrap;
}
.project-meta span { display: flex; align-items: center; }
.project-meta span i { color: var(--accent-gold); margin-right: 8px; }

/* ── CONTENT LAYOUT ── */
.details-grid {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 40px;
  align-items: flex-start;
}

.details-main {
  background: var(--prem-card);
  border: 1px solid var(--prem-border);
  border-radius: 32px;
  padding: 60px;
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  min-width: 0; /* Prevent blowout */
  overflow-wrap: break-word;
}

.details-sidebar {
  display: flex;
  flex-direction: column;
  gap: 24px;
  position: sticky;
  top: 100px;
  min-width: 0;
}

.action-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 12px;
}

.sidebar-card {
  background: var(--prem-card);
  border: 1px solid var(--prem-border);
  border-radius: 24px;
  padding: 32px;
  backdrop-filter: blur(10px);
  overflow-wrap: break-word;
}

.sidebar-card h4 {
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--accent-gold);
  margin-bottom: 20px;
  font-weight: 800;
  opacity: 0.9;
}

.sidebar-card p, .sidebar-card li {
  font-size: 0.92rem;
  line-height: 1.7;
  color: rgba(255,255,255,0.7);
}

/* ── MARKDOWN / README STYLING ── */
.readme-content {
  line-height: 1.8;
  font-size: 1.1rem;
  color: rgba(255,255,255,0.8);
  overflow-wrap: break-word;
}

.readme-content h1, .readme-content h2, .readme-content h3 {
  color: #ffffff !important;
  margin: 48px 0 24px;
  font-weight: 800;
  letter-spacing: -0.03em;
}

.readme-content h1 { font-size: 2.2rem; border-bottom: 1px solid var(--prem-border); padding-bottom: 16px; }
.readme-content h2 { font-size: 1.8rem; }
.readme-content h3 { font-size: 1.4rem; }

.readme-content p { margin-bottom: 24px; }

.readme-content a { color: #4f46e5; text-decoration: none; border-bottom: 1px solid rgba(79, 70, 229, 0.3); transition: all 0.2s; }
.readme-content a:hover { color: #818cf8; border-color: #818cf8; }

.readme-content ul, .readme-content ol { margin: 0 0 32px 24px; }
.readme-content li { margin-bottom: 12px; }

.readme-content code {
  background: rgba(251, 191, 36, 0.1);
  color: #fbbf24;
  padding: 4px 8px;
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 0.85em;
  font-weight: 700;
  border: 1px solid rgba(251, 191, 36, 0.1);
  word-wrap: break-word;
}

.readme-content pre {
  background: #0a0e1a;
  padding: 32px;
  border-radius: 20px;
  overflow-x: auto;
  margin: 32px 0;
  border: 1px solid var(--prem-border);
  box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
}

.readme-content pre code {
  background: transparent;
  color: #e2e8f0;
  padding: 0;
  font-weight: 400;
  border: none;
  white-space: pre;
}

.readme-content blockquote {
  border-left: 4px solid var(--accent-gold);
  background: rgba(255,255,255,0.02);
  margin: 32px 0;
  padding: 24px 32px;
  font-style: italic;
  border-radius: 0 16px 16px 0;
  color: rgba(255,255,255,0.6);
}

/* ── ACTION BUTTONS ── */
.btn-download-big {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: linear-gradient(135deg, #fbbf24, #f43f5e);
  color: #fff;
  padding: 20px;
  border-radius: 18px;
  font-weight: 800;
  text-decoration: none;
  font-size: 1.05rem;
  transition: all 0.3s;
  box-shadow: 0 10px 25px rgba(244, 63, 94, 0.2);
}

.btn-download-big:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(244, 63, 94, 0.4); }

.btn-demo-big {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--prem-border);
  color: #fff;
  padding: 20px;
  border-radius: 18px;
  font-weight: 700;
  text-decoration: none;
  transition: all 0.3s;
}

.btn-demo-big:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }

/* ── SETUP BOX ── */
.setup-box {
  font-family: var(--mono);
  font-size: 0.8rem;
  background: #000;
  padding: 20px;
  border-radius: 12px;
  overflow-x: auto;
  color: #fbbf24;
  border: 1px solid rgba(251, 191, 36, 0.2);
  line-height: 1.5;
}

@media (max-width: 1024px) {
  .details-grid { grid-template-columns: 1fr; gap: 32px; }
  .details-sidebar { position: static; order: 1; }
  .details-main { padding: 40px; order: 2; }
}

@media (max-width: 600px) {
  .details-container { padding: 0 16px; margin: 30px auto 80px; }
  .project-header h1 { font-size: 2rem; margin-bottom: 20px; }
  .project-meta { flex-direction: column; gap: 12px; align-items: flex-start; padding-left: 10px; }
  .details-main { padding: 30px 20px; border-radius: 20px; }
  .readme-content { font-size: 1rem; }
  .readme-content h1 { font-size: 1.8rem; }
  .readme-content pre { padding: 20px; border-radius: 12px; margin: 24px 0; }
  .sidebar-card { padding: 24px 20px; }
}
</style>
</head>
<body>

<div id="navbar-placeholder"></div>

<main class="details-container" id="detailsContainer" style="display:none;">
  <header class="project-header">
    <div class="project-badge"><i class="bi bi-diamond-fill"></i> Premium Project</div>
    <h1 id="pTitle">Loading...</h1>
    <div class="project-meta">
      <span id="pDate"><i class="bi bi-calendar3"></i> Loading...</span>
      <span id="pTech"><i class="bi bi-cpu"></i> Loading...</span>
    </div>
  </header>

  <div class="details-grid">
    <div class="details-main">
      <div id="readmeArea" class="readme-content"></div>
    </div>

    <div class="details-sidebar">
      <div class="action-group">
        <a href="#" id="btnDownload" class="btn-download-big"><i class="bi bi-cloud-arrow-down-fill"></i> Download Project</a>
        <a href="#" id="btnDemo" class="btn-demo-big" target="_blank"><i class="bi bi-play-circle"></i> Live Preview</a>
      </div>
        
      <div class="sidebar-card">
        <h4>Project Purpose</h4>
        <p id="pPurpose"></p>
      </div>

      <div class="sidebar-card">
        <h4>Key Concepts</h4>
        <ul id="pConcepts" style="padding-left: 20px; margin: 0;"></ul>
      </div>

      <div class="sidebar-card">
        <h4>Setup Instructions</h4>
        <pre id="pSetup" class="setup-box"></pre>
      </div>
    </div>
  </div>
</main>

<div id="loadingState" style="text-align:center; padding: 200px 0;">
  <div class="spinner"></div>
  <p style="margin-top: 20px; color: rgba(255,255,255,0.4);">Fetching project details...</p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/db.js"></script>
<script src="../js/navbar.js"></script>

<script>
Auth.onAuthChange(async (user, profile) => {
  if (!user) {
    window.location.href = 'premium-landing.html';
    return;
  }
  if (profile) {
    const isPremium = ['premium','team','superadmin'].includes(profile.role);
    if (!isPremium) {
      window.location.href = 'premium-landing.html';
      return;
    }
    loadProjectDetails();
  }
});

async function loadProjectDetails() {
  const pid = SS.getQueryParam('id');
  if (!pid) {
    alert('Project ID missing');
    window.location.href = 'premium-projects.html';
    return;
  }

  try {
    const p = await DB.getDoc(`ss_premium_projects/${pid}`);
    if (!p) {
      alert('Project not found');
      window.location.href = 'premium-projects.html';
      return;
    }

    // Populate UI
    document.getElementById('pTitle').innerText = p.title;
    document.getElementById('pDate').innerHTML = `<i class="bi bi-calendar3"></i> ${SS.formatDateRelative(p.postedAt)}`;
    document.getElementById('pTech').innerHTML = `<i class="bi bi-cpu"></i> ${p.tags || 'General'}`;
    
    // Markdown README
    if (p.readme_markdown) {
      document.getElementById('readmeArea').innerHTML = marked.parse(p.readme_markdown);
    } else {
      document.getElementById('readmeArea').innerHTML = `<p>${p.description || 'No detailed documentation provided for this project.'}</p>`;
    }

    // Sidebar details
    document.getElementById('pPurpose').innerText = p.purpose || 'Master the architecture of modern web applications.';
    
    const concepts = (p.key_concepts || '').split(',').filter(Boolean);
    document.getElementById('pConcepts').innerHTML = concepts.length > 0 
      ? concepts.map(c => `<li>${c.trim()}</li>`).join('')
      : '<li>Architecture</li><li>Security</li><li>Efficiency</li>';
    
    document.getElementById('pSetup').innerText = p.setup_instructions || 'Check readme for setup details.';
    
    // Actions
    document.getElementById('btnDownload').href = p.github_link || '#';
    if (p.demo_link) {
      document.getElementById('btnDemo').href = p.demo_link;
      document.getElementById('btnDemo').style.display = 'flex';
    } else {
      document.getElementById('btnDemo').style.display = 'none';
    }

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('detailsContainer').style.display = 'block';

  } catch (err) {
    console.error(err);
    alert('Failed to load project details');
  }
}
</script>

</body>
</html>
