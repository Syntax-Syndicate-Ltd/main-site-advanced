<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Company Profile — Syntax Syndicate</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" href="../css/global.css"/>
<link rel="stylesheet" href="../css/components.css"/>
<style>
  /* 🏛️ GRID SYSTEM */
  body { 
    background-color: #f8fafc !important; 
    font-family: 'Plus Jakarta Sans', sans-serif !important;
    color: #1e293b !important;
    padding-top: 80px !important;
  }
  .profile-grid-container {
    display: grid !important;
    grid-template-columns: 340px 1fr !important;
    gap: 48px !important;
    max-width: 1240px !important;
    margin: 40px auto !important;
    padding: 0 32px !important;
    align-items: start !important;
  }

  /* 🛡️ SIDEBAR */
  .sidebar-box { position: sticky !important; top: 110px !important; }
  .profile-hero-card {
    background: rgba(255, 255, 255, 0.8) !important;
    backdrop-filter: blur(20px) !important;
    -webkit-backdrop-filter: blur(20px) !important;
    border: 1px solid rgba(255, 255, 255, 0.6) !important;
    border-radius: 32px !important;
    padding: 48px 32px !important;
    box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.08) !important;
    text-align: center !important;
  }
  .profile-avatar-box {
    width: 120px !important; height: 120px !important;
    background: #fff !important; border-radius: 40px !important;
    display: flex !important; align-items: center !important; justify-content: center !important;
    font-size: 3rem !important; font-weight: 800 !important; color: #4169e1 !important;
    margin: 0 auto 24px !important; border: 4px solid #fff !important;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05) !important;
    transform: rotate(-3deg) !important; transition: 0.3s !important;
    overflow: hidden;
  }
  .profile-avatar-box img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
  .profile-name-text { font-size: 1.8rem !important; font-weight: 800 !important; color: #0f172a !important; margin-bottom: 8px !important; }
  .cp-verified-tag {
    display: inline-flex; align-items: center; gap: 4px; font-size: 0.7rem; font-weight: 800;
    padding: 4px 12px; border-radius: 100px; background: #e8f5e9; color: #2e7d32;
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px;
  }

  /* 📊 STATS */
  .profile-stats-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 12px !important; margin-top: 32px !important; }
  .stat-card-item { background: rgba(255,255,255,0.6) !important; padding: 16px !important; border-radius: 20px !important; text-align: left !important; border: 1px solid rgba(0,0,0,0.03) !important; }
  .stat-card-item strong { display: block !important; font-size: 1.25rem !important; font-weight: 800 !important; color: #0f172a !important; }
  .stat-card-item span { font-size: 0.65rem !important; color: #94a3b8 !important; font-weight: 700 !important; text-transform: uppercase !important; }

  /* 📑 TABS */
  .profile-tabs-nav { 
    display: flex !important; gap: 32px !important; border-bottom: 1px solid #e2e8f0 !important;
    width: 100% !important; margin-bottom: 32px !important; padding: 0 4px !important;
    overflow-x: auto !important; scrollbar-width: none !important;
  }
  .profile-tabs-nav::-webkit-scrollbar { display: none !important; }
  .profile-tab-btn {
    padding: 12px 4px !important; border: none !important; background: transparent !important;
    font-size: 0.9rem !important; font-weight: 600 !important; color: #64748b !important; cursor: pointer !important;
    display: flex !important; align-items: center !important; gap: 8px !important; transition: 0.2s !important;
    border-bottom: 2px solid transparent !important; margin-bottom: -1px !important; flex-shrink: 0 !important;
  }
  .profile-tab-btn.active { color: #0f172a !important; border-bottom-color: #4169e1 !important; }
  .profile-tab-btn i { font-size: 1.1rem; color: #94a3b8; }
  .profile-tab-btn.active i { color: #4169e1; }

  /* 📦 CONTENT GRID */
  .cp-section { display: none !important; }
  .cp-section.active { display: block !important; animation: fadeInProfile 0.4s ease-out !important; }
  @keyframes fadeInProfile { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .cp-content-grid { display: grid !important; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)) !important; gap: 24px !important; }
  .premium-item-card {
    background: #fff !important; border: 1px solid #e2e8f0 !important; border-radius: 24px !important; padding: 28px !important;
    display: flex !important; flex-direction: column !important; gap: 14px !important;
    transition: 0.3s !important; text-decoration: none !important; color: inherit !important;
  }
  .premium-item-card:hover { transform: translateY(-5px) !important; border-color: #4169e1 !important; box-shadow: 0 20px 40px rgba(0,0,0,0.08) !important; }
  
  .card-type-badge { font-family: var(--opp-font-mono, monospace); font-size: 0.65rem; font-weight: 700; padding: 4px 12px; border-radius: 100px; width: fit-content; text-transform: uppercase; letter-spacing: 0.05em; }
  .card-title { font-size: 1.1rem; font-weight: 800; color: #0f172a; line-height: 1.3; }
  .card-desc { font-size: 0.9rem; color: #64748b; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-meta { display: flex; gap: 16px; margin-top: auto; padding-top: 12px; border-top: 1px solid #f1f5f9; font-size: 0.75rem; color: #94a3b8; font-weight: 600; }

  .cp-empty { text-align: center; padding: 80px 20px; color: #94a3b8; font-size: 1rem; font-weight: 600; }
  .cp-loading-box { text-align: center; padding: 150px 20px; }
  .cp-spinner { width: 40px; height: 40px; border: 4px solid #f1f5f9; border-top-color: #4169e1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 980px) {
    .profile-grid-container { grid-template-columns: 1fr !important; padding: 0 20px !important; gap: 32px !important; margin: 20px auto !important; }
    .sidebar-box { position: static !important; }
    .profile-tabs-nav { gap: 20px !important; padding-bottom: 8px !important; }
  }
  @media (max-width: 600px) {
    .cp-content-grid { grid-template-columns: 1fr !important; }
    .profile-hero-card { padding: 32px 20px !important; border-radius: 24px !important; }
    .profile-avatar-box { width: 100px !important; height: 100px !important; margin-bottom: 16px !important; }
    .profile-name-text { font-size: 1.5rem !important; }
    .premium-item-card { padding: 20px !important; border-radius: 18px !important; }
  }
  @media (max-width: 400px) {
    .profile-stats-grid { grid-template-columns: 1fr !important; gap: 10px !important; }
  }
</style>
</head>
<body>
<div id="navbar-placeholder" data-type="main"></div>

<div class="profile-grid-container" id="profileApp" style="display:none !important;">
  <!-- LEFT: Sidebar -->
  <aside class="sidebar-box">
    <div class="profile-hero-card">
      <div class="profile-avatar-box" id="cpAvatar"></div>
      <div id="cpVerified"></div>
      <h1 class="profile-name-text" id="cpName">Loading...</h1>
      <button id="followBtn" style="display:none; width:100%; padding:12px; border-radius:100px; border:none; background:#4169e1; color:#fff; font-weight:700; margin-bottom:24px; cursor:pointer; transition:0.2s;" onclick="handleFollow()">Follow</button>
      
      <div id="cpLinks" style="display:flex; flex-direction:column; gap:12px; text-align:left;"></div>

      <div class="profile-stats-grid" id="cpStats"></div>
    </div>
  </aside>

  <!-- RIGHT: Content Area -->
  <main class="main-content-box">
    <nav class="profile-tabs-nav">
      <button class="profile-tab-btn active" onclick="showTab('opps', this)"><i class="bi bi-briefcase"></i> Opportunities</button>
      <button class="profile-tab-btn" onclick="showTab('roadmaps', this)"><i class="bi bi-map"></i> Roadmaps</button>
      <button class="profile-tab-btn" onclick="showTab('cheatsheets', this)"><i class="bi bi-file-earmark-code"></i> Cheatsheets</button>
      <button class="profile-tab-btn" onclick="showTab('about', this)"><i class="bi bi-person"></i> About</button>
    </nav>

    <!-- Sections -->
    <div class="cp-section active" id="sec-opps">
      <div class="cp-content-grid" id="oppsGrid"></div>
    </div>
    <div class="cp-section" id="sec-roadmaps">
      <div class="cp-content-grid" id="roadmapsGrid"></div>
    </div>
    <div class="cp-section" id="sec-cheatsheets">
      <div class="cp-content-grid" id="cheatsheetsGrid"></div>
    </div>
    <div class="cp-section" id="sec-about">
      <div class="premium-item-card" id="aboutContent" style="white-space: pre-wrap; font-size: 1rem; color: #475569; line-height: 1.8;"></div>
    </div>
  </main>
</div>

<div id="loaderBox" class="cp-loading-box">
  <div class="cp-spinner"></div>
  <p style="color:#64748b; font-weight:600;">Loading Profile...</p>
</div>

<div id="footer-placeholder"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/db.js"></script>
<script src="../js/devhub.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/footer.js"></script>
<script>
const uid = SS.getQueryParam('uid');
const CATEGORY_CONFIG = Auth.CATEGORY_CONFIG || {};

async function init() {
  if (!uid) { document.getElementById('loaderBox').innerHTML = '<h2>Profile Not Found</h2>'; return; }

  try {
    const company = await DB.fetchCompanyProfile(uid);
    if (!company) { document.getElementById('loaderBox').innerHTML = '<h2>Company Not Found</h2>'; return; }

    document.title = `${company.name} — Syntax Syndicate`;
    renderSidebar(company);

    // Load content
    const [opportunities, roadmaps, cheatsheets, fl, fg] = await Promise.all([
      DB.fetchCompanyOpportunities(uid).catch(() => []),
      DB.fetchCompanyRoadmaps(uid).catch(() => []),
      DB.fetchCompanyCheatsheets(uid).catch(() => []),
      (typeof DevHub !== 'undefined') ? DevHub.getFollowerCount(uid).catch(() => 0) : 0,
      (typeof DevHub !== 'undefined') ? DevHub.getFollowingCount(uid).catch(() => 0) : 0
    ]);

    renderStats(opportunities, roadmaps, cheatsheets, fl, fg);
    renderOpps(opportunities);
    renderRoadmaps(roadmaps);
    renderCheatsheets(cheatsheets);

    document.getElementById('aboutContent').innerHTML = company.description ? SS.sanitizeHTML(company.description) : 'No description provided.';

    document.getElementById('loaderBox').style.display = 'none';
    document.getElementById('profileApp').style.setProperty('display', 'grid', 'important');

  } catch(e) {
    console.error(e);
    document.getElementById('loaderBox').innerHTML = '<h2>Error Loading Profile</h2>';
  }
}

let isFollowing = false;
Auth.onAuthChange(async user => {
  if (user && user.uid !== uid && typeof DevHub !== 'undefined') {
    const btn = document.getElementById('followBtn');
    btn.style.display = 'block';
    isFollowing = await DevHub.isFollowing(uid);
    updateFollowUI();
  }
});

async function handleFollow() {
  if (!Auth.getUser()) {
    window.location.href = '../login.html?redirect=' + encodeURIComponent(window.location.href);
    return;
  }
  if (typeof DevHub === 'undefined') return;
  
  const btn = document.getElementById('followBtn');
  btn.disabled = true;
  try {
    if (isFollowing) {
      await DevHub.unfollowUser(uid);
      isFollowing = false;
    } else {
      await DevHub.followUser(uid);
      isFollowing = true;
    }
    updateFollowUI();
  } catch (e) {
    console.error(e);
    SS.showToast('Failed to update follow status', 'error');
  }
  btn.disabled = false;
}

function updateFollowUI() {
  const btn = document.getElementById('followBtn');
  btn.textContent = isFollowing ? 'Following' : 'Follow';
  btn.style.background = isFollowing ? '#f1f5f9' : '#4169e1';
  btn.style.color = isFollowing ? '#0f172a' : '#fff';
}

function renderSidebar(c) {
  const avatar = document.getElementById('cpAvatar');
  if (c.avatar_url) {
    avatar.innerHTML = `<img src="${c.avatar_url}" alt="${c.name}">`;
  } else {
    avatar.innerText = SS.getInitials(c.name || 'C');
  }

  document.getElementById('cpName').innerText = c.name || 'Anonymous Company';
  
  if (c.is_verified) {
    document.getElementById('cpVerified').innerHTML = `<span class="cp-verified-tag"><i class="bi bi-patch-check-fill"></i> Verified Partner</span>`;
  }

  let links = '';
  if (c.domain) {
    links += `<a href="${c.domain}" target="_blank" style="color:#4169e1; text-decoration:none; font-size:0.85rem; font-weight:700; display:flex; align-items:center; gap:8px;"><i class="bi bi-globe2"></i> ${c.domain.replace('https://','').replace('http://','')}</a>`;
  }
  if (c.location) {
    links += `<span style="color:#64748b; font-size:0.85rem; font-weight:600; display:flex; align-items:center; gap:8px;"><i class="bi bi-geo-alt"></i> ${c.location}</span>`;
  }
  document.getElementById('cpLinks').innerHTML = links;
}

function renderStats(o, r, c, fl, fg) {
  document.getElementById('cpStats').innerHTML = `
    <div class="stat-card-item" onclick="showFollowersModal()" style="cursor:pointer; transition:0.2s;"><strong>${fl}</strong><span>Followers</span></div>
    <div class="stat-card-item" onclick="showFollowingModal()" style="cursor:pointer; transition:0.2s;"><strong>${fg}</strong><span>Following</span></div>
    <div class="stat-card-item"><strong>${o.length}</strong><span>Openings</span></div>
    <div class="stat-card-item"><strong>${r.length}</strong><span>Roadmaps</span></div>
    <div class="stat-card-item" style="grid-column: 1 / -1; text-align: center;"><strong>${c.length}</strong><span>Sheets</span></div>
  `;
}

function renderOpps(items) {
  const grid = document.getElementById('oppsGrid');
  if (!items.length) { grid.innerHTML = '<div class="cp-empty">No opportunities posted yet</div>'; return; }
  grid.innerHTML = items.map(o => {
    const cfg = CATEGORY_CONFIG[o._collection] || { label:'Opportunity', icon:'bi-briefcase', bg:'#f1f5f9', color:'#64748b' };
    return `
      <a href="../opportunities/details.html?id=${o.id}&col=${o._collection}" class="premium-item-card">
        <span class="card-type-badge" style="background:${cfg.bg}; color:${cfg.color}"><i class="${cfg.icon}" style="margin-right:4px;"></i> ${cfg.label}</span>
        <div class="card-title">${SS.sanitizeHTML(o.title)}</div>
        <div class="card-desc">${SS.sanitizeHTML(o.description || '')}</div>
        <div class="card-meta">
          <span><i class="bi bi-geo-alt"></i> ${SS.sanitizeHTML(o.location || 'Remote')}</span>
          <span><i class="bi bi-clock"></i> ${o.deadline || 'Ongoing'}</span>
        </div>
      </a>
    `;
  }).join('');
}

function renderRoadmaps(items) {
  const grid = document.getElementById('roadmapsGrid');
  if (!items.length) { grid.innerHTML = '<div class="cp-empty">No roadmaps published yet</div>'; return; }
  grid.innerHTML = items.map(r => `
    <a href="../resources/roadmap.html?id=${r.id}" class="premium-item-card">
      <span class="card-type-badge" style="background:rgba(59,130,246,0.1); color:#4169e1;"><i class="bi bi-map-fill" style="margin-right:4px;"></i> Roadmap</span>
      <div class="card-title">${SS.sanitizeHTML(r.title)}</div>
      <div class="card-desc">${SS.sanitizeHTML(r.description || '')}</div>
      <div class="card-meta">
        <span><i class="bi bi-list-check"></i> ${(r.steps||[]).length} steps</span>
        <span style="text-transform:capitalize;">${r.level || 'beginner'}</span>
      </div>
    </a>
  `).join('');
}

function renderCheatsheets(items) {
  const grid = document.getElementById('cheatsheetsGrid');
  if (!items.length) { grid.innerHTML = '<div class="cp-empty">No cheatsheets published yet</div>'; return; }
  grid.innerHTML = items.map(c => `
    <a href="../resources/cheatsheet.html?id=${c.id}" class="premium-item-card">
      <span class="card-type-badge" style="background:rgba(16,185,129,0.1); color:#059669;"><i class="bi bi-file-earmark-code-fill" style="margin-right:4px;"></i> Cheatsheet</span>
      <div class="card-title">${SS.sanitizeHTML(c.title)}</div>
      <div class="card-desc">${SS.sanitizeHTML(c.description || '')}</div>
      <div class="card-meta">
        <span><i class="bi bi-stack"></i> ${(c.sections||[]).length} sections</span>
      </div>
    </a>
  `).join('');
}



function showTab(name, btn) {
  document.querySelectorAll('.profile-tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.cp-section').forEach(s => s.classList.remove('active'));
  document.getElementById(`sec-${name}`).classList.add('active');
}

async function showFollowersModal() {
  if (typeof DevHub === 'undefined' || !SS.showModal) return;
  SS.showModal('<div style="text-align:center;padding:20px;">Loading...</div>', { title: 'Followers' });
  try {
    const followers = await DevHub.getFollowers(uid);
    if (!followers.length) {
      document.querySelector('.modal-body').innerHTML = '<div style="text-align:center;padding:40px;">No followers yet</div>';
      return;
    }
    const profiles = await Promise.all(followers.map(f => DB.getUserProfile(f.follower_uid || f.uid).catch(() => null)));
    const html = profiles.filter(Boolean).map(p => {
      const avatar = p.avatar_url ? `<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;">` : `<div style="width:100%;height:100%;background:#4169e1;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;">${(p.name||'U')[0].toUpperCase()}</div>`;
      return `
      <a href="${SS.getProfileLink(p)}" onclick="SS.closeModal()" style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #e2e8f0;text-decoration:none;color:inherit;">
        <div style="width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;">${avatar}</div>
        <div><div style="font-weight:700;font-size:0.88rem;">${SS.sanitizeHTML(p.name||'User')}</div><div style="font-size:0.72rem;color:#64748b;">${SS.sanitizeHTML(p.headline||p.domain||'')}</div></div>
      </a>
    `}).join('');
    document.querySelector('.modal-body').innerHTML = '<div style="max-height:400px;overflow-y:auto;">' + html + '</div>';
  } catch(e) { document.querySelector('.modal-body').innerHTML = '<div style="padding:20px;text-align:center;">Error</div>'; }
}

async function showFollowingModal() {
  if (typeof DevHub === 'undefined' || !SS.showModal) return;
  SS.showModal('<div style="text-align:center;padding:20px;">Loading...</div>', { title: 'Following' });
  try {
    const following = await DevHub.getFollowing(uid);
    if (!following.length) {
      document.querySelector('.modal-body').innerHTML = '<div style="text-align:center;padding:40px;">Not following anyone yet</div>';
      return;
    }
    const profiles = await Promise.all(following.map(f => DB.getUserProfile(f.following_uid || f.uid).catch(() => null)));
    const html = profiles.filter(Boolean).map(p => {
      const avatar = p.avatar_url ? `<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;">` : `<div style="width:100%;height:100%;background:#4169e1;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;">${(p.name||'U')[0].toUpperCase()}</div>`;
      return `
      <a href="${SS.getProfileLink(p)}" onclick="SS.closeModal()" style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #e2e8f0;text-decoration:none;color:inherit;">
        <div style="width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;">${avatar}</div>
        <div><div style="font-weight:700;font-size:0.88rem;">${SS.sanitizeHTML(p.name||'User')}</div><div style="font-size:0.72rem;color:#64748b;">${SS.sanitizeHTML(p.headline||p.domain||'')}</div></div>
      </a>
    `}).join('');
    document.querySelector('.modal-body').innerHTML = '<div style="max-height:400px;overflow-y:auto;">' + html + '</div>';
  } catch(e) { document.querySelector('.modal-body').innerHTML = '<div style="padding:20px;text-align:center;">Error</div>'; }
}

init();
</script>
</body>
</html>
