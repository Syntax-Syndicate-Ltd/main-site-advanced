<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login - Syntax Syndicate</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/global.css"/>
<style>
:root {
  --white:      #ffffff;
  --tint:       #f0f4ff;
  --border:     #d0d7e8;
  --text:       #0a0e1a;
  --text-2:     #3d4a66;
  --accent:     #4169e1;
  --carbon-black: #0a0e1a;
  --font: 'DM Sans', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body { font-family:var(--font); background:var(--tint); color:var(--text); line-height:1.6; display:flex; align-items:center; justify-content:center; min-height:100vh; }
.login-wrap { width:100%; max-width:440px; padding:20px; }
.login-card { background:var(--white); border:1px solid var(--border); border-radius:16px; padding:40px; box-shadow:0 12px 48px rgba(10,14,26,0.06); }
.logo { font-size:1.4rem; font-weight:700; color:var(--carbon-black); text-align:center; display:block; text-decoration:none; margin-bottom:8px; }
.sub { text-align:center; color:var(--text-2); font-size:.9rem; margin-bottom:32px; }
.form-group { margin-bottom:16px; }
.form-label { display:block; font-size:.8rem; font-weight:600; margin-bottom:6px; color:var(--text-2); }
.form-input { width:100%; padding:12px 16px; border:1px solid var(--border); border-radius:10px; font-family:var(--font); outline:none; transition:border-color .2s; }
.form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(65,105,225,0.1); }
.btn-submit { width:100%; padding:14px; background:var(--carbon-black); color:#fff; border:none; border-radius:10px; font-weight:600; font-family:var(--font); cursor:pointer; font-size:.95rem; margin-top:8px; transition:background .2s; }
.btn-submit:hover { background:#1a2035; }
.btn-google { width:100%; padding:14px; background:var(--white); color:var(--text); border:1px solid var(--border); border-radius:10px; font-weight:600; font-family:var(--font); cursor:pointer; font-size:.95rem; display:flex; align-items:center; justify-content:center; gap:10px; margin-top:16px; transition:background .2s; }
.btn-google:hover { background:var(--tint); }
.divider { display:flex; align-items:center; text-align:center; margin:24px 0; color:var(--text-2); font-size:.8rem; opacity: 0.7; }
.divider::before, .divider::after { content:''; flex:1; border-bottom:1px solid var(--border); }
.divider::before { margin-right:10px; }
.divider::after { margin-left:10px; }
.links { text-align:center; margin-top:24px; font-size:.85rem; }
.links a { color:var(--accent); text-decoration:none; font-weight:600; }
.links a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="login-wrap">
  <div class="login-card">
    <div class="sub">Welcome back to the collective.</div>
    
    <button class="btn-google" id="btnGoogle">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.73 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
    <div class="divider">or continue with email</div>
    
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" id="email" class="form-input" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" required />
      </div>
      <button type="submit" class="btn-submit" id="btnSubmit">Sign In</button>
    </form>
    
    <div class="links">
      <div style="margin-top:16px;">New member? <a href="register.html">Create an account</a></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/navbar.js"></script>
<script>
  document.getElementById('btnGoogle').addEventListener('click', async () => {
    document.getElementById('btnGoogle').innerText = "Redirecting...";
    await Auth.loginWithGoogle();
  });
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnSubmit');
    const og = btn.innerText;
    btn.innerText = "Signing in...";
    const res = await Auth.login(document.getElementById('email').value, document.getElementById('password').value);
    if (!res.success) btn.innerText = og;
  });
</script>
</body>
</html>
