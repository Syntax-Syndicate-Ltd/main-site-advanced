<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Account - Syntax Syndicate</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/global.css"/>
<style>
:root {
  --white:#ffffff;--tint:#f0f4ff;--border:#d0d7e8;--text:#0a0e1a;--text-2:#3d4a66;
  --accent:#4169e1;--carbon-black:#0a0e1a;--font:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--tint);color:var(--text);line-height:1.6;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 0;}
.login-wrap{width:100%;max-width:520px;padding:20px;}
.login-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:40px;box-shadow:0 12px 48px rgba(10,14,26,0.06);}
.logo{font-size:1.4rem;font-weight:700;color:var(--carbon-black);text-align:center;display:block;text-decoration:none;margin-bottom:8px;}
.sub{text-align:center;color:var(--text-2);font-size:.9rem;margin-bottom:28px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:.78rem;font-weight:600;margin-bottom:5px;color:var(--text-2);}
.form-input,.form-select{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;font-family:var(--font);font-size:.9rem;outline:none;transition:border-color .2s;background:var(--white);}
.form-input:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(65,105,225,0.1);}
.btn-submit{width:100%;padding:14px;background:var(--carbon-black);color:#fff;border:none;border-radius:10px;font-weight:600;font-family:var(--font);cursor:pointer;font-size:.95rem;margin-top:8px;transition:background .2s;}
.btn-submit:hover{background:#1a2035;}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;}
.links{text-align:center;margin-top:20px;font-size:.85rem;}
.links a{color:var(--accent);text-decoration:none;font-weight:600;}
.links a:hover{text-decoration:underline;}
.err-msg{color:#e63946;font-size:.78rem;margin-top:4px;display:none;}
@media(max-width:500px){.form-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="login-wrap">
  <div class="login-card">
    <div class="sub">Create your developer profile</div>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input type="text" id="r-name" class="form-input" placeholder="John Doe" required />
      </div>
      <div class="form-group">
        <label class="form-label">Email Address *</label>
        <input type="email" id="r-email" class="form-input" placeholder="you@email.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Contact Number *</label>
        <input type="tel" id="r-mobile" class="form-input" placeholder="+91 98765 43210" required />
      </div>
      <div class="form-group">
        <label class="form-label">College / Institute *</label>
        <input type="text" id="r-college" class="form-input" placeholder="IIT Bombay" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Level / Year of Study</label>
          <select id="r-level" class="form-select">
            <option value="">Select level</option>
            <option value="1st Year">1st Year</option>
            <option value="2nd Year">2nd Year</option>
            <option value="3rd Year">3rd Year</option>
            <option value="4th Year">4th Year</option>
            <option value="Postgraduate">Postgraduate</option>
            <option value="Working Professional">Working Professional</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Branch of Study</label>
          <input type="text" id="r-branch" class="form-input" placeholder="Computer Science" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password *</label>
          <input type="password" id="r-password" class="form-input" required minlength="6" />
          <div class="err-msg" id="err-pass">Min 6 characters required</div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password *</label>
          <input type="password" id="r-confirm" class="form-input" required />
          <div class="err-msg" id="err-confirm">Passwords do not match</div>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="btnReg">Create Account</button>
    </form>

    <div class="links">
      <div style="margin-top:16px;">Already have an account? <a href="login.html">Sign In</a></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/navbar.js"></script>

<script>
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = document.getElementById('r-password').value;
    const confirm = document.getElementById('r-confirm').value;

    // Reset errors
    document.getElementById('err-pass').style.display = 'none';
    document.getElementById('err-confirm').style.display = 'none';

    if (pw.length < 6) {
      document.getElementById('err-pass').style.display = 'block';
      return;
    }
    if (pw !== confirm) {
      document.getElementById('err-confirm').style.display = 'block';
      return;
    }

    const btn = document.getElementById('btnReg');
    btn.disabled = true;
    btn.innerText = 'Creating Account...';

    const profileData = {
      name: document.getElementById('r-name').value.trim(),
      mobile: document.getElementById('r-mobile').value.trim(),
      college: document.getElementById('r-college').value.trim(),
      level: document.getElementById('r-level').value,
      branch: document.getElementById('r-branch').value.trim()
    };

    const res = await Auth.register(
      document.getElementById('r-email').value.trim(),
      pw,
      profileData
    );

    if (!res.success) {
      btn.disabled = false;
      btn.innerText = 'Create Account';
    }
  });
</script>
</body>
</html>
