<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ideas Hub — Developer's Hub — Syntax Syndicate</title>
<meta name="description" content="Propose and vote on project ideas with the Syntax Syndicate developer community."/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/global.css"/>
<link rel="stylesheet" href="../css/components.css"/>
<link rel="stylesheet" href="../css/devhub.css"/>
</head>
<body class="dh-page">
<div id="navbar-placeholder" data-type="main"></div>

<!-- HERO -->
<div class="dh-hero">
  <div class="dh-hero-inner">
    <div class="dh-hero-badge">
      <svg viewBox="0 0 24 24"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><line x1="9" y1="18" x2="15" y2="18"/><line x1="10" y1="22" x2="14" y2="22"/></svg>
      Ideas Hub
    </div>
    <h1>What Should We <em>Build</em>?</h1>
    <p>Propose ideas, vote on what matters, and help the community decide what to create next.</p>
  </div>
</div>

<!-- SUBNAV -->
<div class="dh-subnav">
  <div class="dh-subnav-inner">
    <a href="feed.html" class="dh-subnav-link"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></a>
    <a href="projects.html" class="dh-subnav-link"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><span>Projects</span></a>
    <a href="snippets.html" class="dh-subnav-link"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg><span>Snippets</span></a>
    <a href="ideas.html" class="dh-subnav-link active"><svg viewBox="0 0 24 24"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><line x1="9" y1="18" x2="15" y2="18"/><line x1="10" y1="22" x2="14" y2="22"/></svg><span>Ideas</span></a>
  </div>
</div>

<div class="dh-layout-full">
  <!-- TOP BAR -->
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:20px;">
    <div class="search-bar" style="flex:1;min-width:220px;max-width:400px;border-radius:100px;">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search ideas..." id="searchInput" oninput="filterIdeas()" style="font-size:.82rem;"/>
    </div>
    <button class="dh-create-btn" onclick="DevHub.showIdeaModal()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Propose Idea
    </button>
  </div>

  <!-- FILTERS -->
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:24px;">
    <div class="dh-filter-bar" id="catFilters">
      <button class="dh-filter-tab active" onclick="filterByCat('all', this)">All</button>
      <button class="dh-filter-tab" onclick="filterByCat('project', this)">🖥️ Project</button>
      <button class="dh-filter-tab" onclick="filterByCat('feature', this)">⚡ Feature</button>
      <button class="dh-filter-tab" onclick="filterByCat('tool', this)">🔧 Tool</button>
    </div>
    <div class="dh-filter-bar" id="statusFilters">
      <button class="dh-filter-tab active" onclick="filterByStatus('all', this)">All</button>
      <button class="dh-filter-tab" onclick="filterByStatus('open', this)">Open</button>
      <button class="dh-filter-tab" onclick="filterByStatus('in_progress', this)">In Progress</button>
      <button class="dh-filter-tab" onclick="filterByStatus('completed', this)">Done</button>
    </div>
    <div class="dh-filter-bar" id="sortBar">
      <button class="dh-filter-tab active" onclick="sortIdeas('hot', this)">🔥 Hot</button>
      <button class="dh-filter-tab" onclick="sortIdeas('new', this)">New</button>
      <button class="dh-filter-tab" onclick="sortIdeas('top', this)">Top</button>
    </div>
  </div>

  <!-- IDEAS -->
  <div id="ideasContainer" style="display:flex;flex-direction:column;gap:14px;">
    <div class="empty-state">
      <div class="empty-state-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <div class="empty-state-title">Loading ideas...</div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/db.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/footer.js"></script>
<script src="../js/devhub.js"></script>
<script>
let allIdeas = [], filteredIdeas = [], activeCat = 'all', activeStatus = 'all', searchQuery = '', sortMode = 'hot';
window._refreshIdeas = () => loadIdeas();
document.addEventListener('DOMContentLoaded', loadIdeas);

async function loadIdeas() {
  try { allIdeas = await DB.queryDocs('ideas', [], 'created_at', 'desc', 200); applyFilters(); }
  catch(e) { renderEmpty('No ideas yet', 'Be the first to propose an idea!'); }
}

function filterByCat(cat, el) { activeCat = cat; document.querySelectorAll('#catFilters .dh-filter-tab').forEach(c => c.classList.remove('active')); el.classList.add('active'); applyFilters(); }
function filterByStatus(s, el) { activeStatus = s; document.querySelectorAll('#statusFilters .dh-filter-tab').forEach(c => c.classList.remove('active')); el.classList.add('active'); applyFilters(); }
function filterIdeas() { searchQuery = document.getElementById('searchInput').value.toLowerCase(); applyFilters(); }
function sortIdeas(m, el) { sortMode = m; document.querySelectorAll('#sortBar .dh-filter-tab').forEach(c => c.classList.remove('active')); el.classList.add('active'); applyFilters(); }

function applyFilters() {
  filteredIdeas = allIdeas.filter(i => {
    return (activeCat==='all'||i.category===activeCat) && (activeStatus==='all'||i.status===activeStatus) && (!searchQuery||(i.title||'').toLowerCase().includes(searchQuery)||(i.description||'').toLowerCase().includes(searchQuery));
  });
  if (sortMode==='hot') filteredIdeas.sort((a,b)=>{const sA=((a.upvotes||[]).length-(a.downvotes||[]).length),sB=((b.upvotes||[]).length-(b.downvotes||[]).length);const aA=Date.now()-(a.created_at?.toDate?.()?.getTime?.()||0),aB=Date.now()-(b.created_at?.toDate?.()?.getTime?.()||0);return(sB/Math.max(1,aB/3600000))-(sA/Math.max(1,aA/3600000));});
  else if (sortMode==='top') filteredIdeas.sort((a,b)=>((b.upvotes||[]).length-(b.downvotes||[]).length)-((a.upvotes||[]).length-(a.downvotes||[]).length));
  renderIdeas();
}

function renderIdeas() {
  const c = document.getElementById('ideasContainer');
  if (!filteredIdeas.length) { renderEmpty(allIdeas.length?'No matching ideas':'No ideas yet', allIdeas.length?'Try different filters.':'Be the first to propose!'); return; }
  c.innerHTML = filteredIdeas.map(i => DevHub.renderIdeaCard(i)).join('');
}

function renderEmpty(t, d) {
  document.getElementById('ideasContainer').innerHTML = `<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/></svg></div><div class="empty-state-title">${t}</div><div class="empty-state-desc">${d}</div></div>`;
}
</script>
</body>
</html>
