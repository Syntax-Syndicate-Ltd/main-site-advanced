<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Developer Profile — Syntax Syndicate</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" href="../css/global.css"/>
<link rel="stylesheet" href="../css/components.css"/>
<style id="premium-profile-styles">
  /* 🏁 RESET & OVERRIDES */
  body { 
    margin: 0 !important; 
    padding: 0 !important; 
    background-color: #f8fafc !important; 
    font-family: 'Plus Jakarta Sans', sans-serif !important;
    color: #1e293b !important;
    padding-top: 80px !important; /* Space for fixed navbar */
  }

  /* 🏛️ GRID SYSTEM */
  .profile-grid-container {
    display: grid !important;
    grid-template-columns: 340px 1fr !important;
    gap: 48px !important;
    max-width: 1240px !important;
    margin: 40px auto !important;
    padding: 0 32px !important;
    align-items: start !important;
  }

  /* 🛡️ SIDEBAR */
  .sidebar-box { position: sticky !important; top: 110px !important; }
  .profile-hero-card {
    background: rgba(255, 255, 255, 0.8) !important;
    backdrop-filter: blur(20px) !important;
    -webkit-backdrop-filter: blur(20px) !important;
    border: 1px solid rgba(255, 255, 255, 0.6) !important;
    border-radius: 32px !important;
    padding: 48px 32px !important;
    box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.08) !important;
    text-align: center !important;
  }
  .profile-avatar-box {
    width: 120px !important; height: 120px !important;
    background: #fff !important; border-radius: 40px !important;
    display: flex !important; align-items: center !important; justify-content: center !important;
    font-size: 3rem !important; font-weight: 800 !important; color: #4169e1 !important;
    margin: 0 auto 24px !important; border: 4px solid #fff !important;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05) !important;
    transform: rotate(-3deg) !important; transition: 0.3s !important;
  }
  .profile-name-text { font-size: 1.8rem !important; font-weight: 800 !important; color: #0f172a !important; margin-bottom: 8px !important; }
  .profile-headline-text { font-size: 0.95rem !important; color: #64748b !important; margin-bottom: 24px !important; }
  
  .profile-stats-grid { display: grid !important; grid-template-columns: 1fr 1fr !important; gap: 12px !important; margin-top: 32px !important; }
  .stat-card-item { background: rgba(255,255,255,0.6) !important; padding: 16px !important; border-radius: 20px !important; text-align: left !important; border: 1px solid rgba(0,0,0,0.03) !important; }
  .stat-card-item strong { display: block !important; font-size: 1.25rem !important; font-weight: 800 !important; color: #0f172a !important; }
  .stat-card-item span { font-size: 0.65rem !important; color: #94a3b8 !important; font-weight: 700 !important; text-transform: uppercase !important; }

  /* 📑 TABS (GitHub Style) */
  .profile-tabs-nav { 
    display: flex !important; gap: 32px !important; border-bottom: 1px solid #e2e8f0 !important;
    width: 100% !important; margin-bottom: 32px !important; padding: 0 4px !important;
  }
  .profile-tab-btn {
    padding: 12px 4px !important; border: none !important; background: transparent !important;
    font-size: 0.9rem !important; font-weight: 600 !important; color: #64748b !important; cursor: pointer !important;
    display: flex !important; align-items: center !important; gap: 8px !important; transition: 0.2s !important;
    border-bottom: 2px solid transparent !important;
    margin-bottom: -1px !important;
  }
  .profile-tab-btn:hover { color: #0f172a !important; }
  .profile-tab-btn.active { color: #0f172a !important; border-bottom-color: #4169e1 !important; }
  .profile-tab-btn i, .profile-tab-btn svg { width: 18px !important; height: 18px !important; color: #94a3b8 !important; }
  .profile-tab-btn.active i, .profile-tab-btn.active svg { color: #4169e1 !important; }

  /* 📦 CONTENT */
  .content-section { display: none !important; }
  .content-section.active { display: block !important; animation: fadeInProfile 0.4s ease-out !important; }
  @keyframes fadeInProfile { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .profile-content-grid { display: grid !important; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)) !important; gap: 24px !important; }
  .premium-item-card {
    background: #fff !important; border: 1px solid #e2e8f0 !important; border-radius: 24px !important; padding: 24px !important;
    display: flex !important; flex-direction: column !important; gap: 12px !important;
    transition: 0.3s !important; text-decoration: none !important; color: inherit !important;
  }
  .premium-item-card:hover { transform: translateY(-5px) !important; border-color: #4169e1 !important; box-shadow: 0 20px 40px rgba(0,0,0,0.08) !important; }

  /* 🗞️ POSTS STYLING */
  .dh-post { background: #fff !important; border: 1px solid #e2e8f0 !important; border-radius: 24px !important; padding: 24px !important; margin-bottom: 20px !important; }
  .dh-post-header { display: flex !important; align-items: center !important; gap: 12px !important; margin-bottom: 16px !important; }
  .dh-post-header .avatar { 
    width: 44px !important; height: 44px !important; border-radius: 12px !important; 
    background: #edf2ff !important; color: #4169e1 !important; font-weight: 800 !important; 
    display: flex !important; align-items: center !important; justify-content: center !important;
    font-size: 0.8rem !important; border: none !important;
  }
  .dh-post-meta { flex: 1 !important; }
  .dh-post-author { display: block !important; font-weight: 700 !important; color: #0f172a !important; font-size: 0.95rem !important; text-decoration: none !important; margin-bottom: 2px !important; line-height: 1.2 !important; }
  .dh-post-time { font-size: 0.75rem !important; color: #94a3b8 !important; font-weight: 600 !important; line-height: 1 !important; }
  .dh-post-content { font-size: 1rem !important; color: #1e293b !important; line-height: 1.6 !important; margin-bottom: 16px !important; white-space: pre-wrap !important; }
  .dh-post-image { width: 100% !important; max-height: 480px !important; object-fit: cover !important; border-radius: 16px !important; margin-bottom: 16px !important; display: block !important; }
  .dh-post-actions { display: flex !important; gap: 16px !important; border-top: 1px solid #f1f5f9 !important; padding-top: 16px !important; }
  .dh-action-btn { 
    background: transparent !important; border: none !important; color: #64748b !important; 
    font-size: 0.85rem !important; font-weight: 700 !important; display: flex !important; align-items: center !important; gap: 6px !important; padding: 0 !important; cursor: pointer !important;
  }
  .dh-action-btn svg { width: 18px !important; height: 18px !important; }
  .dh-action-btn.liked { color: #ef4444 !important; }
  .dh-action-btn.liked svg { fill: #ef4444 !important; }
  .dh-post-menu { background: none !important; border: none !important; color: #cbd5e1 !important; cursor: pointer !important; padding: 4px !important; }
  .dh-post-menu:hover { color: #ef4444 !important; }

  /* 💬 COMMENTS STYLING */
  .dh-comments { display: none !important; margin-top: 16px !important; background: #f8fafc !important; border-radius: 16px !important; padding: 16px !important; }
  .dh-comments.open { display: block !important; }
  .dh-comment { display: flex !important; gap: 12px !important; margin-bottom: 16px !important; }
  .dh-comment .avatar { 
    width: 32px !important; height: 32px !important; border-radius: 10px !important; 
    background: #4169e1 !important; color: #fff !important; font-size: 0.65rem !important; 
    display: flex !important; align-items: center !important; justify-content: center !important; flex-shrink: 0 !important;
  }
  .dh-comment-body { flex: 1 !important; background: #fff !important; padding: 12px 16px !important; border-radius: 14px !important; border: 1px solid #e2e8f0 !important; }
  .dh-comment-author { font-weight: 700 !important; font-size: 0.85rem !important; color: #0f172a !important; margin-bottom: 4px !important; }
  .dh-comment-text { font-size: 0.88rem !important; color: #334155 !important; line-height: 1.5 !important; }
  .dh-comment-time { font-size: 0.7rem !important; color: #94a3b8 !important; margin-top: 6px !important; font-weight: 600 !important; }
  .dh-comment-input { display: flex !important; gap: 8px !important; margin-top: 16px !important; border-top: 1px solid #e2e8f0 !important; padding-top: 16px !important; }
  .dh-comment-input input { 
    flex: 1 !important; padding: 10px 16px !important; border-radius: 12px !important; border: 1px solid #e2e8f0 !important; 
    font-family: inherit !important; font-size: 0.85rem !important; outline: none !important;
  }
  .dh-comment-input input:focus { border-color: #4169e1 !important; box-shadow: 0 0 0 3px rgba(65,105,225,0.1) !important; }
  .dh-comment-input button { background: #4169e1 !important; color: #fff !important; border: none !important; padding: 8px 16px !important; border-radius: 12px !important; font-weight: 700 !important; font-size: 0.82rem !important; cursor: pointer !important; }

  /* 🏗️ PROJECTS STYLING */
  .dh-project-card { 
    background: #fff !important; border: 1px solid #e2e8f0 !important; border-radius: 24px !important; 
    overflow: hidden !important; display: flex !important; flex-direction: column !important; 
    transition: 0.3s !important; text-decoration: none !important; color: inherit !important;
  }
  .dh-project-card:hover { transform: translateY(-8px) !important; box-shadow: 0 20px 40px rgba(0,0,0,0.08) !important; border-color: #4169e1 !important; }
  .dh-project-thumb { width: 100% !important; height: 180px !important; background: #f1f5f9 !important; display: flex !important; align-items: center !important; justify-content: center !important; font-size: 2.5rem !important; overflow: hidden !important; }
  .dh-project-thumb img { width: 100% !important; height: 100% !important; object-fit: cover !important; }
  .dh-project-body { padding: 24px !important; display: flex !important; flex-direction: column !important; gap: 12px !important; flex: 1 !important; }
  .dh-project-title { font-size: 1.1rem !important; font-weight: 800 !important; color: #0f172a !important; }
  .dh-project-desc { font-size: 0.9rem !important; color: #64748b !important; line-height: 1.5 !important; display: -webkit-box !important; -webkit-line-clamp: 2 !important; -webkit-box-orient: vertical !important; overflow: hidden !important; }
  .dh-project-tags { display: flex !important; flex-wrap: wrap !important; gap: 8px !important; }
  .dh-project-tag { background: #f8fafc !important; border: 1px solid #e2e8f0 !important; color: #64748b !important; padding: 4px 10px !important; border-radius: 8px !important; font-size: 0.7rem !important; font-weight: 700 !important; text-transform: uppercase !important; }
  .dh-project-footer { margin-top: auto !important; padding-top: 16px !important; border-top: 1px solid #f1f5f9 !important; display: flex !important; justify-content: space-between !important; align-items: center !important; }
  .dh-project-author { display: flex !important; align-items: center !important; gap: 8px !important; font-size: 0.8rem !important; font-weight: 700 !important; color: #475569 !important; text-decoration: none !important; }
  .dh-project-author .avatar { width: 24px !important; height: 24px !important; border-radius: 6px !important; background: #edf2ff !important; color: #4169e1 !important; display: flex !important; align-items: center !important; justify-content: center !important; font-size: 0.6rem !important; }
  .dh-project-links { display: flex !important; gap: 10px !important; }
  .dh-project-link { color: #94a3b8 !important; transition: 0.2s !important; }
  .dh-project-link:hover { color: #4169e1 !important; }
  .dh-project-link svg { width: 18px !important; height: 18px !important; }

  /* 📝 SNIPPETS STYLING */
  .dh-snippet { background: #0f172a !important; border-radius: 24px !important; overflow: hidden !important; margin-bottom: 24px !important; border: 1px solid rgba(255,255,255,0.1) !important; }
  .dh-snippet-header { background: rgba(255,255,255,0.05) !important; padding: 16px 24px !important; display: flex !important; align-items: center !important; gap: 12px !important; border-bottom: 1px solid rgba(255,255,255,0.1) !important; }
  .dh-snippet-title { font-weight: 700 !important; color: #f8fafc !important; font-size: 0.95rem !important; flex: 1 !important; }
  .dh-snippet-lang { font-family: var(--mono) !important; font-size: 0.7rem !important; font-weight: 700 !important; color: #94a3b8 !important; text-transform: uppercase !important; background: rgba(255,255,255,0.1) !important; padding: 4px 10px !important; border-radius: 6px !important; }
  .dh-snippet-code { position: relative !important; padding: 24px !important; background: #0f172a !important; }
  .dh-snippet-code pre { margin: 0 !important; font-family: var(--mono) !important; font-size: 0.85rem !important; color: #e2e8f0 !important; overflow-x: auto !important; line-height: 1.6 !important; }
  .dh-snippet-copy { position: absolute !important; top: 16px !important; right: 16px !important; background: rgba(255,255,255,0.1) !important; border: none !important; color: #fff !important; padding: 6px 12px !important; border-radius: 8px !important; font-size: 0.75rem !important; font-weight: 700 !important; cursor: pointer !important; opacity: 0 !important; transition: 0.2s !important; }
  .dh-snippet:hover .dh-snippet-copy { opacity: 1 !important; }
  .dh-snippet-footer { padding: 16px 24px !important; background: rgba(255,255,255,0.02) !important; display: flex !important; justify-content: space-between !important; align-items: center !important; }
  .dh-snippet-author { display: flex !important; align-items: center !important; gap: 10px !important; font-size: 0.8rem !important; color: #94a3b8 !important; text-decoration: none !important; font-weight: 600 !important; }
  .dh-snippet-author .avatar { width: 28px !important; height: 28px !important; border-radius: 8px !important; background: #4169e1 !important; color: #fff !important; display: flex !important; align-items: center !important; justify-content: center !important; font-size: 0.65rem !important; }

  /* 📱 MOBILE */
  @media (max-width: 980px) {
    .profile-grid-container { grid-template-columns: 1fr !important; padding: 0 20px !important; }
    .sidebar-box { position: static !important; }
    .profile-tabs-nav { width: 100% !important; overflow-x: auto !important; padding-bottom: 12px !important; }
  }
</style>
</head>
<body>
<div id="navbar-placeholder" data-type="main"></div>

<div class="profile-grid-container" id="mainContainer" style="display:none !important;">
  
  <!-- LEFT -->
  <aside class="sidebar-box">
    <div class="profile-hero-card">
      <div class="profile-avatar-box" id="avatarBox">?</div>
      <h1 class="profile-name-text" id="userName">Loading...</h1>
      <p class="profile-headline-text" id="userHeadline"></p>
      
      <div id="userLocation" style="color:#64748b; font-size:0.85rem; font-weight:700; display:flex; align-items:center; justify-content:center; gap:8px;"></div>
      
      <div id="userSocials" style="display:flex; justify-content:center; gap:16px; margin-top:24px;"></div>

      <div id="userPortfolioBtn" style="margin-top:24px; display:none;">
        <a id="portfolioBtnLink" href="#" target="_blank" class="premium-btn-primary" style="display:flex; align-items:center; justify-content:center; gap:12px; padding:16px; border-radius:20px; font-weight:800; text-decoration:none; background: var(--accent); color:#fff; box-shadow: 0 12px 24px rgba(65,105,225,0.25); transition: all 0.3s var(--ease);">
          <i class="bi bi-box-arrow-up-right"></i> View Portfolio
        </a>
      </div>

      <div id="userActions" style="margin-top:16px; display:none;">
        <button class="dh-follow-btn" id="followBtn" onclick="handleFollow()" style="width:100%; padding:14px; border-radius:16px; font-weight:800;">Follow</button>
      </div>

      <div class="profile-stats-grid" id="statsContainer">
        <!-- JS Populated -->
      </div>
    </div>
  </aside>

  <!-- RIGHT -->
  <main class="main-content-box">
    <nav class="profile-tabs-nav">
      <button class="profile-tab-btn active" onclick="changeTab('posts', this)"><i class="bi bi-grid-1x2"></i> Posts</button>
      <button class="profile-tab-btn" onclick="changeTab('projects', this)"><i class="bi bi-rocket-takeoff"></i> Projects</button>
      <button class="profile-tab-btn" onclick="changeTab('repositories', this)"><i class="bi bi-github"></i> Repos</button>
      <button class="profile-tab-btn" onclick="changeTab('snippets', this)"><i class="bi bi-file-earmark-code"></i> Snippets</button>
      <button class="profile-tab-btn" onclick="changeTab('contributions', this)"><i class="bi bi-file-earmark-pdf"></i> PDF</button>
      <button class="profile-tab-btn" onclick="changeTab('about', this)"><i class="bi bi-person"></i> About</button>
    </nav>

    <!-- Sections -->
    <div class="content-section active" id="sec-posts"><div id="postsList" style="display:flex; flex-direction:column; gap:20px;"></div></div>
    <div class="content-section" id="sec-projects"><div class="profile-content-grid" id="projectsGrid"></div></div>
    <div class="content-section" id="sec-repositories"><div class="profile-content-grid" id="reposGrid"></div></div>
    <div class="content-section" id="sec-snippets"><div id="snippetsList" style="display:flex; flex-direction:column; gap:20px;"></div></div>
    <div class="content-section" id="sec-contributions"><div class="profile-content-grid" id="pdfsGrid"></div></div>
    
    <div class="content-section" id="sec-about">
      <div class="premium-item-card" style="padding:40px; border-radius:32px;">
        <div id="bioArea" style="margin-bottom:32px; display:none;">
          <h3 style="font-size:1.1rem; font-weight:800; margin-bottom:12px;"><i class="bi bi-info-circle" style="margin-right:8px; color:var(--accent);"></i> Bio</h3>
          <div id="bioContent" style="font-size:0.95rem; color:#475569; line-height:1.7; white-space:pre-wrap;"></div>
        </div>
        <div id="skillsArea" style="margin-bottom:32px; display:none;">
          <h3 style="font-size:1.1rem; font-weight:800; margin-bottom:16px;"><i class="bi bi-lightning-charge" style="margin-right:8px; color:var(--accent);"></i> Expertise</h3>
          <div id="skillsContent" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
        </div>
        <h3 style="font-size:1.1rem; font-weight:800; margin-bottom:20px; border-bottom:1px solid #e2e8f0; padding-bottom:12px;">Contact & Info</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px;" id="infoGrid"></div>
      </div>
    </div>
  </main>
</div>

<div id="loader" style="text-align:center; padding:150px 20px; font-size:1.2rem; color:#64748b; font-weight:600;">Initializing Profile...</div>

<div id="footer-placeholder"></div>

<!-- SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/db.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/footer.js"></script>
<script src="../js/devhub.js"></script>

<script>
let uid = null, data = null, isFollowing = false;

document.addEventListener('DOMContentLoaded', async () => {
  uid = SS.getQueryParam('uid');
  if (!uid) { document.getElementById('loader').innerHTML = 'Missing User ID'; return; }
  
  try {
    data = await DB.getUserProfile(uid);
    if (!data) { document.getElementById('loader').innerHTML = 'User Not Found'; return; }
    
    document.title = `${data.name || 'Developer'} — Syntax Syndicate`;
    startProfile();
    fetchData();
    
    Auth.onAuthChange(async (user) => {
      if (user && user.uid !== uid) {
        document.getElementById('userActions').style.display = 'block';
        isFollowing = await DevHub.isFollowing(uid);
        updateFollowUI();
      }
    });
  } catch(e) { document.getElementById('loader').innerHTML = 'Load Error'; }
});

function startProfile() {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('mainContainer').style.setProperty('display', 'grid', 'important');
  
  const name = data.name || 'Anonymous';
  document.getElementById('avatarBox').innerHTML = SS.renderAvatar(data, 'lg circle');
  
  let nameHTML = SS.sanitizeHTML(name);
  const role = data.role || 'user';
  if (role !== 'user') {
    const labels = { superadmin: 'Admin', team: 'Team', premium: 'Pro' };
    nameHTML += ` <span class="badge badge-accent" style="margin-left:8px;">${labels[role] || role}</span>`;
  }
  document.getElementById('userName').innerHTML = nameHTML;
  document.getElementById('userHeadline').textContent = data.headline || '';
  
  if (data.location) document.getElementById('userLocation').innerHTML = `<i data-lucide="map-pin" style="width:14px;"></i> ${SS.sanitizeHTML(data.location)}`;

  // Socials
  let sHTML = '';
  if (data.github) sHTML += `<a href="${data.github}" target="_blank" class="p-social-btn"><i data-lucide="github"></i></a>`;
  if (data.linkedin) sHTML += `<a href="${data.linkedin}" target="_blank" class="p-social-btn"><i data-lucide="linkedin"></i></a>`;
  document.getElementById('userSocials').innerHTML = sHTML;

  if (data.portfolio_link) {
    document.getElementById('userPortfolioBtn').style.display = 'block';
    document.getElementById('portfolioBtnLink').href = data.portfolio_link;
  }

  // Bio
  if (data.bio) {
    document.getElementById('bioArea').style.display = 'block';
    document.getElementById('bioContent').textContent = data.bio;
  }
  if (data.skills) {
    document.getElementById('skillsArea').style.display = 'block';
    document.getElementById('skillsContent').innerHTML = data.skills.split(',').map(s => 
      `<span style="background:#edf2ff; color:#4169e1; padding:6px 14px; border-radius:10px; font-size:12px; font-weight:700;">${s.trim()}</span>`
    ).join('');
  }

  // Info Grid
  const info = [];
  if (data.privacy_email) info.push({ l: 'Email', v: data.email, i: 'mail' });
  if (data.privacy_mobile) info.push({ l: 'Mobile', v: data.mobile, i: 'phone' });
  if (data.privacy_education !== false) {
    info.push({ l: 'College', v: data.college, i: 'graduation-cap' });
    info.push({ l: 'Course', v: data.branch, i: 'book' });
  }
  info.push({ l: 'Member Since', v: data.created_at ? SS.formatDate(data.created_at) : '—', i: 'calendar' });

  document.getElementById('infoGrid').innerHTML = info.map(x => `
    <div>
      <div style="font-size:0.65rem; color:#94a3b8; font-weight:800; text-transform:uppercase; display:flex; align-items:center; gap:6px; margin-bottom:4px;">
        <i class="bi bi-${x.i === 'mail' ? 'envelope' : (x.i === 'phone' ? 'telephone' : (x.i === 'graduation-cap' ? 'mortarboard' : (x.i === 'book' ? 'journal-text' : (x.i === 'calendar' ? 'calendar3' : x.i))))}"></i> ${x.l}
      </div>
      <div style="font-size:0.95rem; font-weight:600; color:#1e293b;">${x.v || '—'}</div>
    </div>
  `).join('');
}

async function fetchData() {
  const load = async (col, target, renderer, msg, filterField = 'author_uid') => {
    try {
      const docs = await DB.queryDocs(col, [[filterField,'==',uid]], null, null, 50);
      const div = document.getElementById(target);
      if (!div) return;
      if (docs.length) {
        div.innerHTML = docs.map(d => {
          try { return renderer(d); } catch(err) { console.error(`Render error in ${col}:`, err); return ''; }
        }).join('');
      } else {
        div.innerHTML = `<div style="padding:40px; text-align:center; color:#94a3b8;">${msg}</div>`;
      }
    } catch(e) { console.error(`Load error for ${col}:`, e); }
  };

  load('devhub_posts', 'postsList', p => DevHub.renderPostCard(p), 'No posts published');
  load('projects', 'projectsGrid', p => DevHub.renderProjectCard(p), 'No projects shared');
  load('snippets', 'snippetsList', p => DevHub.renderSnippetBlock(p), 'No snippets saved');
  load('pdfs', 'pdfsGrid', d => `
    <a class="premium-item-card" href="../archives/viewer.html?id=${d.id}" target="_blank">
      <div style="font-weight:800; font-size:1.1rem; display:flex; align-items:center; gap:10px;">
        <i class="bi bi-file-earmark-pdf" style="color:#ef4444;"></i> ${SS.sanitizeHTML(d.title || 'Untitled')}
      </div>
      <div style="font-size:0.9rem; color:#64748b;">${SS.sanitizeHTML(d.description || '')}</div>
      <div style="margin-top:auto; display:flex; gap:8px;">
        <span class="badge badge-accent">${d.type || 'PDF'}</span>
        <span style="font-size:0.75rem; color:#94a3b8; align-self:center;">${SS.formatDateRelative(d.created_at)}</span>
      </div>
    </a>
  `, 'No PDFs shared', 'posted_by');

  // Repos
  if (data.github) {
    try {
      const user = data.github.split('/').filter(Boolean).pop();
      if (!user) throw new Error("Invalid GitHub profile");
      
      const res = await fetch(`https://api.github.com/users/${user}/repos?sort=updated&per_page=12`);
      if (!res.ok) throw new Error("API Limit or User not found");
      
      const repos = await res.json();
      if (!Array.isArray(repos)) throw new Error("Invalid response");

      const filtered = repos.filter(r => !r.fork);
      if (filtered.length === 0) {
        document.getElementById('reposGrid').innerHTML = '<div style="padding:40px; text-align:center; color:#94a3b8;">No public repositories found.</div>';
      } else {
        document.getElementById('reposGrid').innerHTML = filtered.map(r => `
          <a href="${r.html_url}" target="_blank" class="premium-item-card">
            <div style="display:flex; justify-content:space-between;">
              <div style="font-weight:800; font-size:1.1rem;">${SS.sanitizeHTML(r.name)}</div>
              <i class="bi bi-github" style="color:#94a3b8;"></i>
            </div>
            <div style="font-size:0.9rem; color:#64748b; line-height:1.5;">${SS.sanitizeHTML(r.description || 'No description provided')}</div>
            <div style="margin-top:auto; display:flex; gap:16px; font-size:0.8rem; font-weight:700; color:#94a3b8;">
              <span><i class="bi bi-star" style="margin-right:4px;"></i>${r.stargazers_count}</span>
              <span><i class="bi bi-code-slash" style="margin-right:4px;"></i>${r.language || 'Git'}</span>
            </div>
          </a>
        `).join('');
      }
    } catch(e) { 
      console.error('GitHub Sync Error:', e);
      document.getElementById('reposGrid').innerHTML = `<div style="padding:40px; text-align:center; color:#94a3b8;">Sync Error: ${e.message}</div>`; 
    }
  } else {
    document.getElementById('reposGrid').innerHTML = '<div style="padding:40px; text-align:center; color:#94a3b8;">GitHub profile not linked.</div>';
  }

  // Stats
  try {
    const [p, s, fl, fg, contribs] = await Promise.all([
      DB.queryDocs('projects', [['author_uid','==',uid]]),
      DB.queryDocs('snippets', [['author_uid','==',uid]]),
      DevHub.getFollowerCount(uid),
      DevHub.getFollowingCount(uid),
      DB.queryDocs('pdfs', [['posted_by','==',uid]])
    ]);
    document.getElementById('statsContainer').innerHTML = `
      <div class="stat-card-item" onclick="changeTab('projects', document.querySelectorAll('.profile-tab-btn')[1])" style="cursor:pointer;"><strong>${p.length}</strong><span>Projects</span></div>
      <div class="stat-card-item" onclick="changeTab('snippets', document.querySelectorAll('.profile-tab-btn')[3])" style="cursor:pointer;"><strong>${s.length}</strong><span>Snippets</span></div>
      <div class="stat-card-item" onclick="changeTab('contributions', document.querySelectorAll('.profile-tab-btn')[4])" style="cursor:pointer;"><strong>${contribs.length}</strong><span>PDFs</span></div>
      <div class="stat-card-item" onclick="showFollowersModal()" style="cursor:pointer; background:#fff !important; border:1px solid #e2e8f0 !important;"><strong>${fl}</strong><span>Followers</span></div>
      <div class="stat-card-item" onclick="showFollowingModal()" style="cursor:pointer; background:#fff !important; border:1px solid #e2e8f0 !important;"><strong>${fg}</strong><span>Following</span></div>
    `;
  } catch(e) { console.error('Stats load error:', e); }
}

async function showFollowersModal() {
  SS.showModal('<div style="text-align:center;padding:20px;">Loading...</div>', { title: 'Followers' });
  try {
    const followers = await DevHub.getFollowers(uid);
    if (!followers.length) {
      document.querySelector('.modal-body').innerHTML = '<div style="text-align:center;padding:40px;">No followers yet</div>';
      return;
    }
    const profiles = await Promise.all(followers.map(f => DB.getUserProfile(f.follower_uid || f.uid).catch(() => null)));
    const html = profiles.filter(Boolean).map(p => `
      <a href="profile.html?uid=${p.uid||p.id}" onclick="SS.closeModal()" style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f1f5f9;text-decoration:none;color:inherit;">
        <div style="width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;">${SS.renderAvatar(p, 'sm circle')}</div>
        <div><div style="font-weight:700;font-size:0.88rem;">${SS.sanitizeHTML(p.name||'User')}</div><div style="font-size:0.72rem;color:#64748b;">${p.headline||''}</div></div>
      </a>
    `).join('');
    document.querySelector('.modal-body').innerHTML = '<div style="max-height:400px;overflow-y:auto;">' + html + '</div>';
  } catch(e) { document.querySelector('.modal-body').innerHTML = '<div style="padding:20px;text-align:center;">Error</div>'; }
}

async function showFollowingModal() {
  SS.showModal('<div style="text-align:center;padding:20px;">Loading...</div>', { title: 'Following' });
  try {
    const following = await DevHub.getFollowing(uid);
    if (!following.length) {
      document.querySelector('.modal-body').innerHTML = '<div style="text-align:center;padding:40px;">Not following anyone yet</div>';
      return;
    }
    const profiles = await Promise.all(following.map(f => DB.getUserProfile(f.following_uid || f.uid).catch(() => null)));
    const html = profiles.filter(Boolean).map(p => `
      <a href="profile.html?uid=${p.uid||p.id}" onclick="SS.closeModal()" style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f1f5f9;text-decoration:none;color:inherit;">
        <div style="width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;">${SS.renderAvatar(p, 'sm circle')}</div>
        <div><div style="font-weight:700;font-size:0.88rem;">${SS.sanitizeHTML(p.name||'User')}</div><div style="font-size:0.72rem;color:#64748b;">${p.headline||''}</div></div>
      </a>
    `).join('');
    document.querySelector('.modal-body').innerHTML = '<div style="max-height:400px;overflow-y:auto;">' + html + '</div>';
  } catch(e) { document.querySelector('.modal-body').innerHTML = '<div style="padding:20px;text-align:center;">Error</div>'; }
}

function changeTab(name, btn) {
  document.querySelectorAll('.profile-tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
  document.getElementById(`sec-${name}`).classList.add('active');
}

async function handleFollow() {
  if (!Auth.getUser()) return;
  const btn = document.getElementById('followBtn'); btn.disabled = true;
  try {
    if (isFollowing) { await DevHub.unfollowUser(uid); isFollowing = false; }
    else { await DevHub.followUser(uid); isFollowing = true; }
    updateFollowUI();
  } catch(e) {}
  btn.disabled = false;
}

function updateFollowUI() {
  const btn = document.getElementById('followBtn');
  btn.textContent = isFollowing ? 'Following' : 'Follow';
  btn.style.background = isFollowing ? '#f1f5f9' : '#4169e1';
  btn.style.color = isFollowing ? '#0f172a' : '#fff';
}
</script>
</body>
</html>
