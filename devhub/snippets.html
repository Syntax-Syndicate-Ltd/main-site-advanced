<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Code Snippets — Developer's Hub — Syntax Syndicate</title>
<meta name="description" content="Discover and share code snippets with the Syntax Syndicate developer community."/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/global.css"/>
<link rel="stylesheet" href="../css/components.css"/>
<link rel="stylesheet" href="../css/devhub.css"/>
</head>
<body class="dh-page">
<div id="navbar-placeholder" data-type="main"></div>

<!-- HERO -->
<div class="dh-hero">
  <div class="dh-hero-inner">
    <div class="dh-hero-badge">
      <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Code Snippets
    </div>
    <h1>Reusable <em>Code</em></h1>
    <p>Share useful code snippets, utility functions, and clever solutions with the community.</p>
  </div>
</div>

<!-- SUBNAV -->
<div class="dh-subnav">
  <div class="dh-subnav-inner">
    <a href="feed.html" class="dh-subnav-link"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>Home</span></a>
    <a href="projects.html" class="dh-subnav-link"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><span>Projects</span></a>
    <a href="snippets.html" class="dh-subnav-link active"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg><span>Snippets</span></a>
    <a href="ideas.html" class="dh-subnav-link"><svg viewBox="0 0 24 24"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><line x1="9" y1="18" x2="15" y2="18"/><line x1="10" y1="22" x2="14" y2="22"/></svg><span>Ideas</span></a>
  </div>
</div>

<div class="dh-layout-full">
  <!-- TOP BAR -->
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:20px;">
    <div class="search-bar" style="flex:1;min-width:220px;max-width:400px;border-radius:100px;">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search snippets..." id="searchInput" oninput="filterSnippets()" style="font-size:.82rem;"/>
    </div>
    <button class="dh-create-btn" onclick="DevHub.showSnippetModal()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Share Snippet
    </button>
  </div>

  <!-- FILTERS -->
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:24px;">
    <div class="dh-filter-bar" id="langFilters">
      <button class="dh-filter-tab active" onclick="filterByLang('all', this)">All</button>
      <button class="dh-filter-tab" onclick="filterByLang('javascript', this)">JS</button>
      <button class="dh-filter-tab" onclick="filterByLang('python', this)">Python</button>
      <button class="dh-filter-tab" onclick="filterByLang('html', this)">HTML</button>
      <button class="dh-filter-tab" onclick="filterByLang('css', this)">CSS</button>
      <button class="dh-filter-tab" onclick="filterByLang('java', this)">Java</button>
      <button class="dh-filter-tab" onclick="filterByLang('cpp', this)">C++</button>
    </div>
    <div class="dh-filter-bar" id="sortBar">
      <button class="dh-filter-tab active" onclick="sortSnippets('new', this)">Newest</button>
      <button class="dh-filter-tab" onclick="sortSnippets('popular', this)">Popular</button>
    </div>
  </div>

  <!-- SNIPPETS -->
  <div id="snippetsContainer" style="display:flex;flex-direction:column;gap:18px;">
    <div class="empty-state">
      <div class="empty-state-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <div class="empty-state-title">Loading snippets...</div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/db.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/footer.js"></script>
<script src="../js/devhub.js"></script>
<script>
let allSnippets = [], filteredSnippets = [], activeLang = 'all', searchQuery = '', sortMode = 'new';
window._refreshSnippets = () => loadSnippets();
document.addEventListener('DOMContentLoaded', loadSnippets);

async function loadSnippets() {
  try { allSnippets = await DB.queryDocs('snippets', [], 'created_at', 'desc', 200); applyFilters(); }
  catch(e) { renderEmpty('No snippets yet', 'Be the first to share a code snippet!'); }
}

function filterByLang(lang, el) {
  activeLang = lang;
  document.querySelectorAll('#langFilters .dh-filter-tab').forEach(c => c.classList.remove('active'));
  el.classList.add('active'); applyFilters();
}

function sortSnippets(mode, el) {
  sortMode = mode;
  document.querySelectorAll('#sortBar .dh-filter-tab').forEach(c => c.classList.remove('active'));
  el.classList.add('active'); applyFilters();
}

function filterSnippets() { searchQuery = document.getElementById('searchInput').value.toLowerCase(); applyFilters(); }

function applyFilters() {
  filteredSnippets = allSnippets.filter(s => {
    const ml = activeLang === 'all' || s.language === activeLang;
    const ms = !searchQuery || (s.title||'').toLowerCase().includes(searchQuery) || (s.code||'').toLowerCase().includes(searchQuery);
    return ml && ms;
  });
  if (sortMode === 'popular') filteredSnippets.sort((a,b) => (b.likes||[]).length - (a.likes||[]).length);
  renderSnippets();
}

function renderSnippets() {
  const c = document.getElementById('snippetsContainer');
  if (!filteredSnippets.length) { renderEmpty(allSnippets.length?'No matching snippets':'No snippets yet', allSnippets.length?'Try different filters.':'Be the first to share!'); return; }
  c.innerHTML = filteredSnippets.map(s => DevHub.renderSnippetBlock(s)).join('');
}

function renderEmpty(t, d) {
  document.getElementById('snippetsContainer').innerHTML = `<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></div><div class="empty-state-title">${t}</div><div class="empty-state-desc">${d}</div></div>`;
}
</script>
</body>
</html>
