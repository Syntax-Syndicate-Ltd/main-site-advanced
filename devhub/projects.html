<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Projects — Developer's Hub — Syntax Syndicate</title>
<meta name="description" content="Explore project showcases by Syntax Syndicate developers. Share your own projects with the community."/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/global.css"/>
<link rel="stylesheet" href="../css/components.css"/>
<link rel="stylesheet" href="../css/devhub.css"/>
</head>
<body class="dh-page">
<div id="navbar-placeholder" data-type="main"></div>

<!-- HERO -->
<div class="dh-hero">
  <div class="dh-hero-bg"></div>
  <div class="dh-hero-orb"></div>
  <div class="dh-hero-inner">
    <div class="dh-hero-badge">
      <i class="bi bi-rocket-takeoff"></i>
      Project Showcase
    </div>
    <h1>Built by <em>Developers</em></h1>
    <p>Explore real projects built by community members. Share yours to get feedback and recognition.</p>
  </div>
</div>

<!-- SUBNAV -->
<div class="dh-subnav">
  <div class="dh-subnav-inner">
    <a href="feed.html" class="dh-subnav-link"><i class="bi bi-house-door"></i><span>Home</span></a>
    <a href="projects.html" class="dh-subnav-link active"><i class="bi bi-rocket-takeoff"></i><span>Projects</span></a>
    <a href="snippets.html" class="dh-subnav-link"><i class="bi bi-file-earmark-code"></i><span>Snippets</span></a>
    <a href="ideas.html" class="dh-subnav-link"><i class="bi bi-lightbulb"></i><span>Ideas</span></a>
  </div>
</div>

<div class="dh-layout-full">
  <!-- TOP BAR -->
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:20px;">
    <div class="search-bar" style="flex:1;min-width:220px;max-width:400px;border-radius:100px;">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search projects..." id="searchInput" oninput="filterProjects()" style="font-size:.82rem;"/>
    </div>
    <button class="dh-create-btn" onclick="DevHub.showProjectModal()">
      <i class="bi bi-plus-lg"></i>
      Add Project
    </button>
  </div>

  <!-- FILTER CHIPS -->
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:24px;">
    <div class="dh-filter-bar" id="techFilters">
      <button class="dh-filter-tab active" onclick="filterByTech('all', this)">All</button>
      <button class="dh-filter-tab" onclick="filterByTech('react', this)">React</button>
      <button class="dh-filter-tab" onclick="filterByTech('next.js', this)">Next.js</button>
      <button class="dh-filter-tab" onclick="filterByTech('python', this)">Python</button>
      <button class="dh-filter-tab" onclick="filterByTech('firebase', this)">Firebase</button>
    </div>
    <div class="dh-filter-bar" id="sortFilters">
      <button class="dh-filter-tab active" onclick="sortProjects('new', this)">Newest</button>
      <button class="dh-filter-tab" onclick="sortProjects('popular', this)">Popular</button>
    </div>
  </div>

  <!-- GRID -->
  <div class="dh-projects-grid" id="projectsGrid">
    <div class="empty-state" style="grid-column:1/-1;">
      <div class="empty-state-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <div class="empty-state-title">Loading projects...</div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/db.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/footer.js"></script>
<script src="../js/devhub.js"></script>
<script>
let allProjects = [], filteredProjects = [], activeTech = 'all', searchQuery = '', sortMode = 'new';
window._refreshProjects = () => loadProjects();
document.addEventListener('DOMContentLoaded', loadProjects);

async function loadProjects() {
  try { allProjects = await DB.queryDocs('projects', [], 'created_at', 'desc', 100); applyFilters(); }
  catch(e) { document.getElementById('projectsGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/></svg></div><div class="empty-state-title">No projects yet</div><div class="empty-state-desc">Be the first to share a project!</div></div>'; }
}

function filterByTech(tech, el) {
  activeTech = tech.toLowerCase();
  document.querySelectorAll('#techFilters .dh-filter-tab').forEach(c => c.classList.remove('active'));
  el.classList.add('active'); applyFilters();
}

function sortProjects(mode, el) {
  sortMode = mode;
  document.querySelectorAll('#sortFilters .dh-filter-tab').forEach(c => c.classList.remove('active'));
  el.classList.add('active'); applyFilters();
}

function filterProjects() { searchQuery = document.getElementById('searchInput').value.toLowerCase(); applyFilters(); }

function applyFilters() {
  filteredProjects = allProjects.filter(p => {
    const mt = activeTech === 'all' || (p.tech_stack||[]).some(t => t.toLowerCase().includes(activeTech));
    const ms = !searchQuery || (p.title||'').toLowerCase().includes(searchQuery) || (p.description||'').toLowerCase().includes(searchQuery) || (p.author_name||'').toLowerCase().includes(searchQuery);
    return mt && ms;
  });
  if (sortMode === 'popular') filteredProjects.sort((a,b) => (b.likes||[]).length - (a.likes||[]).length);
  renderProjects();
}

function renderProjects() {
  const g = document.getElementById('projectsGrid');
  if (!filteredProjects.length) { g.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/></svg></div><div class="empty-state-title">'+(allProjects.length?'No matching projects':'No projects yet')+'</div><div class="empty-state-desc">'+(allProjects.length?'Try different filters.':'Be the first to share!')+'</div></div>'; return; }
  g.innerHTML = filteredProjects.map(p => DevHub.renderProjectCard(p)).join('');
}
</script>
</body>
</html>
